<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoorDash Clarity — Maria Dumitrescu</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #191919;
            width: 210mm;
            height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40mm 20mm;
            color: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            width: 100%;
            max-width: 170mm;
            text-align: center;
        }

        .icon-wrapper {
            margin: 0 auto 30px;
            width: 100px;
            height: 100px;
            background: #FF3008;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper svg {
            width: 56px;
            height: 56px;
            color: white;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .author-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .author-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .author-name {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .author-role {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .link-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .link-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FF3008;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .url-display {
            background: #FF3008;
            color: white;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            word-break: break-all;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .footer-item {
            text-align: center;
        }

        .footer-label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .footer-value {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        @media print {
            body {
                background: #191919 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z"/>
            </svg>
        </div>

        <h1 class="title">DoorDash Clarity</h1>
        <p class="subtitle">AI-powered transparency for the ordering experience</p>

        <div class="author-box">
            <p class="author-label">Designed by</p>
            <h2 class="author-name">Maria Dumitrescu</h2>
            <p class="author-role">Product Design Intern Application</p>
        </div>

        <div class="link-box">
            <p class="link-label">View Full Proposal Online</p>
            <div class="url-display">mariadumitrescu.com/doordash-improvement.html</div>
        </div>

        <div class="footer">
            <div class="footer-item">
                <div class="footer-label">Position</div>
                <div class="footer-value">Product Design Intern</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">Location</div>
                <div class="footer-value">San Francisco, CA</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">Date</div>
                <div class="footer-value">January 2026</div>
            </div>
        </div>
    </div>
</body>
</html>
