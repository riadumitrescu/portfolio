<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamable Pulse — Maria Dumitrescu</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            width: 210mm;
            height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40mm 20mm;
            color: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            width: 100%;
            max-width: 170mm;
            text-align: center;
        }

        /* Icon */
        .icon-wrapper {
            margin: 0 auto 30px;
            width: 100px;
            height: 100px;
            background: #48C2F9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper svg {
            width: 56px;
            height: 56px;
            color: white;
        }

        /* Title */
        .title {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Author Section */
        .author-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .author-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .author-name {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .author-role {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Link Section */
        .link-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .link-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #48C2F9;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .url-display {
            background: #48C2F9;
            color: white;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            word-break: break-all;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: center;
            gap: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .footer-item {
            text-align: center;
        }

        .footer-label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .footer-value {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        @media print {
            body {
                background: #0a0a0f !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Icon -->
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/>
            </svg>
        </div>

        <!-- Title -->
        <h1 class="title">Streamable Pulse</h1>
        <p class="subtitle">Real-time command center for IRL streamers</p>

        <!-- Author -->
        <div class="author-box">
            <p class="author-label">Designed by</p>
            <h2 class="author-name">Maria Dumitrescu</h2>
            <p class="author-role">Design / UX Intern Application</p>
        </div>

        <!-- Link -->
        <div class="link-box">
            <p class="link-label">View Full Proposal Online</p>
            <div class="url-display">mariadumitrescu.com/streamable-improvement.html</div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-item">
                <div class="footer-label">Position</div>
                <div class="footer-value">Design / UX Intern</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">Company</div>
                <div class="footer-value">Streamable (YC F24)</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">Date</div>
                <div class="footer-value">January 2026</div>
            </div>
        </div>
    </div>
</body>
</html>
