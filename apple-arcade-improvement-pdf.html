<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Arcade Playground — Maria Dumitrescu</title>
    <style>
        @page { size: A4 portrait; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, sans-serif;
            background: #000;
            width: 210mm;
            height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            position: relative;
            overflow: hidden;
        }

        /* ── Ambient light ── */
        .glow {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 660px;
            height: 660px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 107, 107, 0.45) 0%,
                rgba(167, 139, 250, 0.35) 25%,
                rgba(96, 165, 250, 0.2) 45%,
                rgba(52, 211, 153, 0.08) 65%,
                transparent 80%
            );
            filter: blur(20px);
            pointer-events: none;
        }

        /* ── Zones ── */
        .top {
            padding-top: 72mm;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .mid {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .bottom {
            padding-bottom: 22mm;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* ── Title ── */
        .eyebrow {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 600;
            margin-bottom: 28px;
        }

        .title {
            font-size: 58px;
            font-weight: 800;
            line-height: 1.02;
            letter-spacing: -2.5px;
            margin-bottom: 20px;
        }

        .t-white { display: block; color: white; }
        .t-gradient {
            display: block;
            background: linear-gradient(135deg, #FF6B6B 0%, #A78BFA 45%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        /* ── URL card ── */
        .url-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            margin-bottom: 18px;
        }

        .url-border {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B6B, #A78BFA, #60A5FA);
            border-radius: 16px;
            padding: 1.5px;
        }

        .url-inner {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            padding: 22px 40px;
        }

        .url-text {
            font-size: 17px;
            font-weight: 600;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            color: white;
            letter-spacing: -0.5px;
        }

        /* ── Footer ── */
        .rule {
            width: 36px;
            height: 2.5px;
            background: linear-gradient(90deg, #FF6B6B, #A78BFA, #60A5FA);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .credit {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 7px;
            letter-spacing: -0.1px;
        }

        .meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.2px;
        }

        @media print {
            body { background: #000 !important; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="top">
        <p class="eyebrow">Design Proposal</p>
        <h1 class="title">
            <span class="t-white">Apple Arcade</span>
            <span class="t-gradient">Playground</span>
        </h1>
        <p class="tagline">Mood-based discovery for the games you'll love</p>
    </div>

    <div class="mid">
        <p class="url-label">View Full Proposal</p>
        <div class="url-border">
            <div class="url-inner">
                <span class="url-text">mariadumitrescu.com/apple-arcade-improvement.html</span>
            </div>
        </div>
    </div>

    <div class="bottom">
        <div class="rule"></div>
        <p class="credit">Maria Dumitrescu</p>
        <p class="meta">Product Design Summer Internship · Apple Arcade · February 2026</p>
    </div>
</body>
</html>
